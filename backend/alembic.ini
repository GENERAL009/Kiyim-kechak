# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path pathpower; prepend or append to sys.path
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion of the sqlalchemy url to only include
# connection-level details
# sqlalchemy.url = postgresql://wms_user:wms_secure_pass_2026@postgres:5432/wms_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)-5.5s] [%(name)s] %(message)s
datefmt = %H:%M:%S
